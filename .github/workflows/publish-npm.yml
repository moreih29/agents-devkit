name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify version parity
        run: |
          pkg=$(node -p "require('./package.json').version")
          plugin=$(node -p "require('./.claude-plugin/plugin.json').version")
          market=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          tag="${GITHUB_REF_NAME#v}"
          echo "package=$pkg plugin=$plugin marketplace=$market tag=$tag"
          [ "$pkg" = "$plugin" ] && [ "$plugin" = "$market" ] && [ "$market" = "$tag" ] || { echo "version mismatch"; exit 1; }

      - name: Publish
        run: npm publish --access public
